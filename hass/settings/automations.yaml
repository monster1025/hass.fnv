- id: '1700337065799'
  alias: Turn_on_AC_heater_evening
  description: ''
  trigger:
  - platform: time
    at: '23:00:00'
  condition:
  - condition: state
    entity_id: sensor.tag_danil_iphone
    state: mainroom
  action:
  - service: remote.send_command
    target:
      device_id: 3493f23712217b8085d5e05870b37fb4
    data:
      command: power_on
      device: ac
  mode: single
- id: '1700337256838'
