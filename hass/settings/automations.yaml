- id: '1753212993227'
  alias: Low Battery Notifications & Actions
  description: ''
  use_blueprint:
    path: Blackshome/low-battery-notifications-and-actions.yaml
    input:
      include_time: time_enabled
      time: '10:00:00'
      battery_level: 10
      exclude_sensors:
        entity_id:
        - sensor.monsterphone13_battery_level
      include_easy_notify: disabled_easy_notify
      notify_device: []
      include_persistent_notification: disabled_persistent_notification
      include_custom_actions: enable_custom_actions
      custom_actions:
      - action: notify.telegram_monster
        data:
          message: '<b>Садится батарея в датчиках:</b>


            {{all_sensors}}'
          data:
            parse_mode: html
