yandex_station_intents:
  intents:
    Как дела: Все хорошо
    Коля наказан: Отключаю интернет в детской
    Включи вентилятор:
      execute_command: Поставь режим вентиляции на кондиционере в комнате {{ event.room }}
    Выключи вентилятор:
      execute_command: Выключи кондиционер в комнате {{ event.room }}
    
    Не выключай свет в прихожей:      # (4)
      extra_phrases:
        - Не выключай свет в коридоре
      say_phrase: "{{ ['Договорились', 'Хорошо', 'Я тебя услышала', 'Оки-доки']|random }}"
