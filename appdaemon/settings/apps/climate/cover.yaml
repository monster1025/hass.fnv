#################################
#        HOME PRESENSE          #
#################################
cover_action:
  module: cover
  class: CoverByPresence
  sunrise_offset: 0
  sunset_offset: 0
  guest_mode: input_boolean.guest_mode
  covers:
    - cover.curtain_bedroom
    - cover.curtain_bedroom_balcony
    #- cover.curtain_bedroom_bobbinet_balcony
    - cover.curtain_kitchen
    - cover.curtain_mainroom
    #- cover.curtain_mainroom_bobbinet
  close_at_sunset:
    - cover.curtain_bedroom
    - cover.curtain_bedroom_balcony
    - cover.curtain_bedroom_bobbinet_balcony
    - cover.curtain_kitchen
    - cover.curtain_mainroom
    - cover.curtain_mainroom_bobbinet
  open_at_sunrise:
    - cover.curtain_kitchen
    - cover.curtain_mainroom
  cover_door_sensors:
    cover.curtain_bedroom:
      - binary_sensor.door_bedroom_big_window_contact
    cover.curtain_bedroom_balcony:
      - binary_sensor.door_balcony_contact
    cover.curtain_bedroom_bobbinet_balcony:
      - binary_sensor.door_balcony_contact
  global_dependencies:
    - globals

